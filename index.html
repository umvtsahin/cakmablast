<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast Duo - Professional Edition</title>
    <style>
        /* MODERN ARTIK PROFESYONEL CODES - SİBER GECE (VARSAYILAN) */
        :root {
            --bg-main: #0a0f1d;
            --bg-panel: rgba(16, 22, 42, 0.75);
            --bg-cell: #172033;
            --border-color: rgba(59, 130, 246, 0.25);
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.35);
            --accent: #facc15;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        /* PREMIUM GÜNDÜZ MODU */
        body.day-mode {
            --bg-main: #f1f5f9;
            --bg-panel: rgba(255, 255, 255, 0.85);
            --bg-cell: #cbd5e1;
            --border-color: rgba(15, 23, 42, 0.12);
            --primary: #2563eb;
            --primary-glow: rgba(37, 99, 235, 0.2);
            --accent: #d97706;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --shadow-color: rgba(15, 23, 42, 0.1);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(rgba(59, 130, 246, 0.06) 1px, transparent 1px),
                radial-gradient(rgba(59, 130, 246, 0.04) 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--text-main);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ULTRA MODERN MENÜ TASARIMI */
        #menu-screen {
            background: var(--bg-panel);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            box-shadow: 0 30px 60px var(--shadow-color), inset 0 1px 0 rgba(255,255,255,0.05);
            text-align: center;
            width: 90%;
            max-width: 400px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .logo-area h1 {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            color: var(--text-main);
        }

        .logo-area h1 span {
            color: var(--primary);
            position: relative;
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 6px;
            font-weight: 600;
        }

        /* PROFESYONEL AYAR PANELİ */
        .settings-card {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255,255,255,0.02);
            border-radius: var(--radius-md);
            padding: 8px 16px;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }
        body.day-mode .setting-row { border-bottom-color: rgba(0,0,0,0.05); }
        .setting-row:last-child { border-bottom: none; }

        .setting-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-main);
        }

        /* PREMIUM PILL TOGGLES */
        .toggle-btn {
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 6px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        body.day-mode .toggle-btn { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.08); }
        .toggle-btn.active {
            background: var(--primary);
            color: #fff;
            box-shadow: 0 0 12px var(--primary-glow);
            border-color: transparent;
        }

        .input-group {
            position: relative;
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            text-align: center;
            transition: all 0.3s ease;
        }
        body.day-mode input { background: #fff; }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 16px var(--primary-glow);
        }

        .btn-premium {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--primary-glow);
            transition: all 0.2s ease;
        }
        .btn-premium:hover {
            transform: translateY(-1px);
            filter: brightness(1.1);
        }
        .btn-premium:active {
            transform: translateY(1px);
        }

        /* OYUN EKRANI AYARLARI */
        #game-screen {
            display: none;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            overflow: hidden;
        }

        .header-bar {
            width: 100%;
            max-width: 480px;
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: var(--radius-md);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 8px 32px var(--shadow-color);
        }

        .status-badge {
            background: rgba(59, 130, 246, 0.12);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 11px;
            color: #60a5fa;
        }

        .boards-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 480px;
            gap: 16px;
            flex-grow: 1;
            justify-content: center;
            align-items: center;
            min-height: 0;
        }

        .arena-panel {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 12px;
            box-shadow: 0 16px 36px var(--shadow-color);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 300px;
        }
        @media (min-height: 740px) {
            .arena-panel { max-width: 340px; padding: 16px; }
        }

        .arena-panel.opponent-panel {
            max-width: 160px;
            opacity: 0.6;
            pointer-events: none;
        }
        @media (min-height: 740px) {
            .arena-panel.opponent-panel { max-width: 190px; }
        }

        .panel-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
        }
        .panel-title span.score { color: var(--text-main); font-size: 15px; font-weight: 800; }

        .score-val { display: inline-block; }
        .score-val.score-pop {
            animation: scorePop 0.3s ease-out;
        }

        @keyframes scorePop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: var(--accent); }
            100% { transform: scale(1); }
        }

        /* KUSURSUZ GRID MOTORU */
        .grid-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 4px;
            background: rgba(0, 0, 0, 0.15);
            padding: 6px;
            border-radius: var(--radius-md);
            aspect-ratio: 1 / 1;
            width: 100%;
        }

        .grid-board.shake-active {
            animation: explodeShake 0.3s ease-in-out;
        }

        @keyframes explodeShake {
            0%, 100% { transform: scale(1); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-1px, -1px); }
            80% { transform: translate(1px, 1px); }
        }

        .cell {
            background: var(--bg-cell);
            border-radius: 4px;
            position: relative;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }

        /* 3D BLOK GÖRÜNÜMÜ */
        .cell.filled-block, .p-cell.active-block {
            box-shadow: inset 2px 2px 0 rgba(255,255,255,0.25), inset -2px -2px 0 rgba(0,0,0,0.3);
            border-radius: 4px;
        }

        /* GHOST PREVIEW KATMANI - BOYANMA SIKINTISINI ÇÖZEN YAPI */
        .cell.preview-ghost {
            opacity: 0.55;
            box-shadow: inset 0 0 0 2px #fff;
        }

        /* ENVANTER ALANI */
        .inventory-area {
            width: 100%;
            max-width: 480px;
            background: var(--bg-panel);
            border-top: 1px solid var(--border-color);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 16px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            min-height: 115px;
            box-shadow: 0 -10px 30px var(--shadow-color);
        }

        .piece-holder {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 28%;
            aspect-ratio: 1 / 1;
            cursor: grab;
        }
        .piece-holder:active { cursor: grabbing; }

        .piece-matrix {
            display: grid;
            gap: 2px;
            transform: scale(0.75);
        }

        .p-cell {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }
        @media (min-height: 740px) {
            .p-cell { width: 20px; height: 20px; }
            .inventory-area { min-height: 135px; }
        }

        .dragging-active {
            position: fixed;
            pointer-events: none;
            transform: scale(1.1);
            z-index: 1000;
            filter: drop-shadow(0 12px 20px rgba(0,0,0,0.4));
        }

        .floating-score {
            position: fixed;
            pointer-events: none;
            color: var(--accent);
            font-weight: 800;
            font-size: 22px;
            z-index: 3000;
            animation: scoreFloat 0.7s ease-out forwards;
        }

        @keyframes scoreFloat {
            0% { transform: translate(-50%, 0) scale(0.7); opacity: 0; }
            20% { transform: translate(-50%, -20px) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%, -70px) scale(1); opacity: 0; }
        }

        #game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 15, 29, 0.95);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .overlay-card {
            background: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 40px 30px;
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 360px;
            box-shadow: 0 30px 60px var(--shadow-color);
            text-align: center;
        }

        @media (min-width: 768px) {
            .boards-wrapper { flex-direction: row; max-width: 900px; gap: 32px; }
            .arena-panel { max-width: 340px; padding: 16px; }
            .arena-panel.opponent-panel { max-width: 340px; opacity: 1; pointer-events: auto; }
            #game-screen { padding: 24px; }
            .header-bar, .inventory-area { max-width: 900px; }
            .p-cell { width: 22px; height: 22px; }
            .panel-title { font-size: 12px; }
            .panel-title span.score { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="logo-area">
            <h1>BLOCK <span>BLAST</span></h1>
            <p>Premium Arcade Duel</p>
        </div>

        <div class="settings-card">
            <div class="setting-row">
                <div class="setting-label">Tema Görünümü</div>
                <button class="toggle-btn active" id="toggle-night">GECE</button>
            </div>
            <div class="setting-row">
                <div class="setting-label">Efekt Sesleri</div>
                <button class="toggle-btn active" id="toggle-fx">AÇIK</button>
            </div>
            <div class="setting-row">
                <div class="setting-label">Chiptune Müzik</div>
                <button class="toggle-btn" id="toggle-bgm">KAPALI</button>
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="room-id-input" placeholder="ODA KODUNU GİRİN" maxlength="12">
        </div>
        <button class="btn-premium" id="btn-connect">DÜELLO BAŞLATSIN</button>
    </div>

    <div id="game-screen">
        <div class="header-bar">
            <div>ODA: <span id="display-room-id" style="color:var(--primary)">-</span></div>
            <div class="status-badge" id="match-status">BAĞLANTI BEKLENİYOR</div>
        </div>

        <div class="boards-wrapper">
            <div class="arena-panel opponent-panel" id="remote-panel">
                <div class="panel-title">
                    <span>RAKİBİN SAHASI</span>
                    <span class="score"><span class="score-val" id="score-remote">0</span></span>
                </div>
                <div class="grid-board" id="board-remote"></div>
            </div>

            <div class="arena-panel" id="local-panel">
                <div class="panel-title">
                    <span>SENİN SAHAN</span>
                    <span class="score">SKOR: <span class="score-val" id="score-local">0</span></span>
                </div>
                <div class="grid-board" id="board-local"></div>
            </div>
        </div>

        <div class="inventory-area" id="inventory"></div>
    </div>

    <div id="game-over-overlay">
        <div class="overlay-card">
            <h2 id="game-over-title" style="color:#ef4444; font-size:22px; margin-bottom:10px; font-weight:800;">HAMLE KALMADI</h2>
            <p id="game-over-msg" style="color:var(--text-muted); font-size:13px; margin-bottom:20px; font-weight:600; text-transform:uppercase;">Durum Kontrol Ediliyor...</p>
            
            <div style="background:rgba(0, 0, 0, 0.15); padding:16px; border-radius:var(--radius-md); margin-bottom:24px; text-align:left;">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px;">
                    <span>Skorunuz:</span> <b id="final-local-score" style="color:var(--accent);">0</b>
                </div>
                <div style="display:flex; justify-content:space-between; font-size:14px;">
                    <span>Rakibin Skoru:</span> <b id="final-remote-score">0</b>
                </div>
            </div>

            <button class="btn-premium" onclick="window.location.reload()">YENİDEN SAVAŞ</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDqVkR87Oxwv_F-5Ty-fPDG70_WTy9p7i8",
            authDomain: "cakmablast.firebaseapp.com",
            databaseURL: "https://cakmablast-default-rtdb.firebaseio.com",
            projectId: "cakmablast",
            storageBucket: "cakmablast.firebasestorage.app",
            messagingSenderId: "1063000035304",
            appId: "1:1063000035304:web:fc3dafa8945f5a289b1e5d",
            measurementId: "G-14SKV6VER7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- RETRO SOUND ENGINE ---
        const SoundFX = {
            ctx: null,
            fxEnabled: true,
            bgmEnabled: false,
            bgmInterval: null,
            bgmStep: 0,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playClick() {
                if (!this.fxEnabled) return; this.init();
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'triangle'; osc.frequency.setValueAtTime(440, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.04, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            },
            playPlace() {
                if (!this.fxEnabled) return; this.init();
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(280, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(140, this.ctx.currentTime + 0.08);
                gain.gain.setValueAtTime(0.12, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
                osc.start(); osc.stop(this.ctx.currentTime + 0.08);
            },
            playExplode() {
                if (!this.fxEnabled) return; this.init();
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'square'; osc.frequency.setValueAtTime(110, this.ctx.currentTime); osc.frequency.linearRampToValueAtTime(550, this.ctx.currentTime + 0.25);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
                osc.start(); osc.stop(this.ctx.currentTime + 0.25);
            },
            startBGM() {
                this.init(); if (this.bgmInterval) return;
                const notes = [261.63, 293.66, 329.63, 392.00, 329.63, 293.66, 392.00, 440.00];
                this.bgmInterval = setInterval(() => {
                    if (!this.bgmEnabled) return;
                    let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(notes[this.bgmStep % notes.length], this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.02, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.22);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.25); this.bgmStep++;
                }, 250);
            },
            stopBGM() { if (this.bgmInterval) { clearInterval(this.bgmInterval); this.bgmInterval = null; } }
        };

        // --- PANEL TOGGLES INTERACTION ---
        document.getElementById('toggle-night').addEventListener('click', (e) => {
            document.body.classList.toggle('day-mode');
            const isNight = !document.body.classList.contains('day-mode');
            e.target.innerText = isNight ? "GECE" : "GÜNDÜZ";
            e.target.classList.toggle('active', isNight);
            SoundFX.playClick();
        });

        document.getElementById('toggle-fx').addEventListener('click', (e) => {
            SoundFX.fxEnabled = !SoundFX.fxEnabled;
            e.target.innerText = SoundFX.fxEnabled ? "AÇIK" : "KAPALI";
            e.target.classList.toggle('active', SoundFX.fxEnabled);
            SoundFX.playClick();
        });

        document.getElementById('toggle-bgm').addEventListener('click', (e) => {
            SoundFX.bgmEnabled = !SoundFX.bgmEnabled;
            e.target.innerText = SoundFX.bgmEnabled ? "AÇIK" : "KAPALI";
            e.target.classList.toggle('active', SoundFX.bgmEnabled);
            SoundFX.playClick();
            if (SoundFX.bgmEnabled) SoundFX.startBGM(); else SoundFX.stopBGM();
        });

        // --- ZENGİN BLOK HAVUZU VE RENKLER ---
        const PIECE_TEMPLATES = [
            { matrix: [[1, 1], [1, 1]], color: "#eab308" },       // Kare - Sarı
            { matrix: [[1, 1, 1, 1]], color: "#06b6d4" },        // Çubuk - Turkuaz
            { matrix: [[1, 1, 1], [0, 1, 0]], color: "#a855f7" }, // T-Blok - Mor
            { matrix: [[0, 1, 1], [1, 1, 0]], color: "#22c55e" }, // S-Blok - Yeşil
            { matrix: [[1, 1, 0], [0, 1, 1]], color: "#ef4444" }, // Z-Blok - Kırmızı
            { matrix: [[1, 0], [1, 0], [1, 1]], color: "#f97316" }, // L-Blok - Turuncu
            { matrix: [[0, 1], [0, 1], [1, 1]], color: "#3b82f6" }, // J-Blok - Mavi
            { matrix: [[1, 1, 1]], color: "#10b981" },           // Kısa Çubuk - Zümrüt
            { matrix: [[1]], color: "#64748b" }                   // Mini - Gri
        ];

        let roomCode = "";
        let playerSide = ""; 
        let localGrid = Array(8).fill().map(() => Array(8).fill(0));
        let localScore = 0;
        let currentPieces = []; 

        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const roomInput = document.getElementById('room-id-input');
        const btnConnect = document.getElementById('btn-connect');
        const displayRoomId = document.getElementById('display-room-id');
        const matchStatus = document.getElementById('match-status');
        const inventory = document.getElementById('inventory');
        const boardLocal = document.getElementById('board-local');

        btnConnect.addEventListener('click', () => {
            SoundFX.init();
            if (SoundFX.bgmEnabled) SoundFX.startBGM();
            roomCode = roomInput.value.trim().toLowerCase();
            if (!roomCode) { alert("Geçerli bir oda kodu girin!"); return; }

            const roomRef = ref(db, 'blast_rooms/' + roomCode);

            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    playerSide = "p1";
                    set(roomRef, {
                        p1: { score: 0, board: JSON.stringify(localGrid), isGameOver: false },
                        status: "waiting"
                    });
                } else if (!data.p2) {
                    if (playerSide === "") {
                        playerSide = "p2";
                        update(ref(db, `blast_rooms/${roomCode}/p2`), { score: 0, board: JSON.stringify(localGrid), isGameOver: false });
                        update(roomRef, { status: "playing" });
                    }
                } else if (playerSide === "") {
                    alert("Seçtiğiniz oda dolu!"); window.location.reload();
                }
                launchGameStream();
            }, { onlyOnce: true });
        });

        function launchGameStream() {
            menuScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            displayRoomId.innerText = roomCode.toUpperCase();

            onValue(ref(db, `blast_rooms/${roomCode}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                if (data.status === "playing") {
                    matchStatus.innerText = "SAVAŞ BAŞLADI";
                    matchStatus.style.color = "#10b981";
                }

                if (playerSide === "p1") {
                    animateScoreDisplay('score-local', data.p1.score);
                    if (data.p2) {
                        animateScoreDisplay('score-remote', data.p2.score);
                        syncBoardDisplay('board-remote', JSON.parse(data.p2.board));
                    }
                } else {
                    if (data.p2) animateScoreDisplay('score-local', data.p2.score);
                    if (data.p1) {
                        animateScoreDisplay('score-remote', data.p1.score);
                        syncBoardDisplay('board-remote', JSON.parse(data.p1.board));
                    }
                }

                if (data.p1 && data.p2) {
                    if (data.p1.isGameOver && data.p2.isGameOver) {
                        let msg = "";
                        if (data.p1.score > data.p2.score) msg = "🥇 1. OYUNCU KAZANDI!";
                        else if (data.p2.score > data.p1.score) msg = "🥇 2. OYUNCU KAZANDI!";
                        else msg = "🤝 BERABERE BİTTİ!";

                        document.getElementById('game-over-overlay').style.display = 'flex';
                        document.getElementById('game-over-title').innerText = "MAÇ BİTTİ";
                        document.getElementById('game-over-msg').innerText = msg;
                        document.getElementById('final-local-score').innerText = playerSide === "p1" ? data.p1.score : data.p2.score;
                        document.getElementById('final-remote-score').innerText = playerSide === "p1" ? data.p2.score : data.p1.score;
                    }
                }
            });

            createLocalBoard();
            spawnInventoryPieces();
        }

        function animateScoreDisplay(elementId, targetScore) {
            const el = document.getElementById(elementId);
            const currentScore = parseInt(el.innerText) || 0;
            if (currentScore === targetScore) return;

            el.classList.remove('score-pop'); void el.offsetWidth; el.classList.add('score-pop');

            let start = currentScore;
            const duration = 300;
            const startTime = performance.now();

            function run(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                el.innerText = Math.floor(start + (targetScore - start) * progress);
                if (progress < 1) requestAnimationFrame(run); else el.innerText = targetScore;
            }
            requestAnimationFrame(run);
        }

        function triggerJuiceEffects(pointsText) {
            boardLocal.classList.remove('shake-active'); 
            void boardLocal.offsetWidth; 
            boardLocal.classList.add('shake-active');
            
            const rect = boardLocal.getBoundingClientRect();
            const floater = document.createElement('div');
            floater.className = 'floating-score'; floater.innerText = pointsText;
            floater.style.left = `${rect.left + rect.width / 2}px`; floater.style.top = `${rect.top + rect.height / 2}px`;
            document.body.appendChild(floater); setTimeout(() => floater.remove(), 700);
        }

        function createLocalBoard() {
            boardLocal.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div'); cell.classList.add('cell');
                    cell.dataset.row = r; cell.dataset.col = c; boardLocal.appendChild(cell);
                }
            }
        }

        function syncBoardDisplay(elementId, gridArray) {
            const targetBoard = document.getElementById(elementId); targetBoard.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div'); cell.classList.add('cell');
                    if (gridArray[r][c] !== 0) {
                        cell.classList.add('filled-block');
                        cell.style.backgroundColor = gridArray[r][c];
                    }
                    targetBoard.appendChild(cell);
                }
            }
        }

        function spawnInventoryPieces() {
            inventory.innerHTML = ''; currentPieces = [];
            for (let i = 0; i < 3; i++) {
                const template = PIECE_TEMPLATES[Math.floor(Math.random() * PIECE_TEMPLATES.length)];
                const rows = template.matrix.length; const cols = template.matrix[0].length;
                const pieceObj = { matrix: template.matrix, color: template.color, rows, cols, id: 'p_' + i + '_' + Date.now() };
                currentPieces.push(pieceObj);

                const holder = document.createElement('div'); holder.classList.add('piece-holder');
                const matrixEl = document.createElement('div'); matrixEl.classList.add('piece-matrix');
                matrixEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

                template.matrix.forEach(rowArray => {
                    rowArray.forEach(val => {
                        const pCell = document.createElement('div'); pCell.classList.add('p-cell');
                        if (val === 1) { pCell.classList.add('active-block'); pCell.style.backgroundColor = template.color; }
                        else pCell.style.background = 'transparent';
                        matrixEl.appendChild(pCell);
                    });
                });
                holder.appendChild(matrixEl); inventory.appendChild(holder);
                setupDragAndDrop(holder, pieceObj);
            }
            verifyGameOverState();
        }

        function setupDragAndDrop(holder, pieceObj) {
            let activeClone = null; const yOffset = -70;

            holder.addEventListener('pointerdown', (e) => {
                e.preventDefault(); SoundFX.playClick(); holder.style.opacity = '0.2';
                activeClone = holder.querySelector('.piece-matrix').cloneNode(true);
                activeClone.classList.add('dragging-active'); document.body.appendChild(activeClone);
                moveClone(e.clientX, e.clientY); holder.setPointerCapture(e.pointerId);
            });

            holder.addEventListener('pointermove', (e) => {
                if (!activeClone) return; moveClone(e.clientX, e.clientY);
                highlightPlacementPreview(e.clientX, e.clientY + yOffset, pieceObj);
            });

            holder.addEventListener('pointerup', (e) => {
                if (!activeClone) return; holder.releasePointerCapture(e.pointerId);
                activeClone.remove(); activeClone = null; holder.style.opacity = '1';
                clearPreviews();

                if (executePlacement(e.clientX, e.clientY + yOffset, pieceObj)) {
                    holder.remove(); currentPieces = currentPieces.filter(p => p.id !== pieceObj.id);
                    if (currentPieces.length === 0) spawnInventoryPieces(); else verifyGameOverState();
                }
            });

            function moveClone(x, y) {
                if (!activeClone) return;
                activeClone.style.left = `${x - (pieceObj.cols * 10)}px`;
                activeClone.style.top = `${y - (pieceObj.rows * 10) + yOffset}px`;
            }
        }

        function getTargetCellFromCoords(x, y) {
            const rect = boardLocal.getBoundingClientRect();
            if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                return {
                    c: Math.floor((x - rect.left) / (rect.width / 8)),
                    r: Math.floor((y - rect.top) / (rect.height / 8))
                };
            }
            return null;
        }

        // BOYANMA HATASINI TAMAMEN ÇÖZEN VE EN TEMİZ MATRİS TEMİZLİĞİNİ YAPAN KOD BLOĞU
        function clearPreviews() { 
            const cells = document.querySelectorAll('#board-local .cell');
            let idx = 0;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    cells[idx].classList.remove('preview-ghost');
                    if (localGrid[r][c] === 0) {
                        cells[idx].style.backgroundColor = '';
                    } else {
                        cells[idx].style.backgroundColor = localGrid[r][c];
                    }
                    idx++;
                }
            }
        }

        function highlightPlacementPreview(x, y, pieceObj) {
            clearPreviews(); const target = getTargetCellFromCoords(x, y);
            if (!target || target.r + pieceObj.rows > 8 || target.c + pieceObj.cols > 8) return;

            let valid = true;
            for (let r = 0; r < pieceObj.rows; r++) {
                for (let c = 0; c < pieceObj.cols; c++) {
                    if (pieceObj.matrix[r][c] === 1 && localGrid[target.r + r][target.c + c] !== 0) valid = false;
                }
            }
            if (valid) {
                const cells = document.querySelectorAll('#board-local .cell');
                for (let r = 0; r < pieceObj.rows; r++) {
                    for (let c = 0; c < pieceObj.cols; c++) {
                        if (pieceObj.matrix[r][c] === 1) {
                            const idx = (target.r + r) * 8 + (target.c + c);
                            cells[idx].classList.add('preview-ghost');
                            cells[idx].style.backgroundColor = pieceObj.color;
                        }
                    }
                }
            }
        }

        function executePlacement(x, y, pieceObj) {
            const target = getTargetCellFromCoords(x, y);
            if (!target || target.r + pieceObj.rows > 8 || target.c + pieceObj.cols > 8) return false;

            for (let r = 0; r < pieceObj.rows; r++) {
                for (let c = 0; c < pieceObj.cols; c++) {
                    if (pieceObj.matrix[r][c] === 1 && localGrid[target.r + r][target.c + c] !== 0) return false;
                }
            }

            for (let r = 0; r < pieceObj.rows; r++) {
                for (let c = 0; c < pieceObj.cols; c++) {
                    if (pieceObj.matrix[r][c] === 1) localGrid[target.r + r][target.c + c] = pieceObj.color;
                }
            }

            localScore += 15; checkLinesAndExplode(); renderLocalUI(); SoundFX.playPlace();
            update(ref(db, `blast_rooms/${roomCode}/${playerSide}`), { score: localScore, board: JSON.stringify(localGrid) });
            return true;
        }

        function renderLocalUI() {
            const cells = document.querySelectorAll('#board-local .cell'); let i = 0;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    cells[i].className = 'cell'; cells[i].style.backgroundColor = '';
                    if (localGrid[r][c] !== 0) { cells[i].classList.add('filled-block'); cells[i].style.backgroundColor = localGrid[r][c]; }
                    i++;
                }
            }
        }

        function checkLinesAndExplode() {
            let fullRows = []; let fullCols = [];
            for (let r = 0; r < 8; r++) { if (localGrid[r].every(v => v !== 0)) fullRows.push(r); }
            for (let c = 0; c < 8; c++) {
                let full = true; for (let r = 0; r < 8; r++) { if (localGrid[r][c] === 0) full = false; }
                if (full) fullCols.push(c);
            }
            fullRows.forEach(r => localGrid[r].fill(0));
            fullCols.forEach(c => { for (let r = 0; r < 8; r++) localGrid[r][c] = 0; });

            if (fullRows.length > 0 || fullCols.length > 0) {
                const bonus = (fullRows.length + fullCols.length) * 120; localScore += bonus;
                SoundFX.playExplode(); triggerJuiceEffects(`+${bonus} LİNE!`);
            }
        }

        function verifyGameOverState() {
            if (currentPieces.length === 0) return;
            let canMove = false;
            for (let piece of currentPieces) {
                if (testPieceFit(piece.matrix, piece.rows, piece.cols)) { canMove = true; break; }
            }
            if (!canMove) {
                update(ref(db, `blast_rooms/${roomCode}/${playerSide}`), { isGameOver: true });
                document.getElementById('final-local-score').innerText = localScore;
                document.getElementById('final-remote-score').innerText = document.getElementById('score-remote').innerText;
                document.getElementById('game-over-overlay').style.display = 'flex';
                matchStatus.innerText = "OYUN BİTTİ"; matchStatus.style.color = "#ef4444";
            }
        }

        function testPieceFit(matrix, rows, cols) {
            for (let r = 0; r <= 8 - rows; r++) {
                for (let c = 0; c <= 8 - cols; c++) {
                    let fits = true;
                    for (let pr = 0; pr < rows; pr++) {
                        for (let pc = 0; pc < cols; pc++) {
                            if (matrix[pr][pc] === 1 && localGrid[r + pr][c + pc] !== 0) { fits = false; break; }
                        }
                        if (!fits) break;
                    }
                    if (fits) return true;
                }
            }
            return false;
        }
    </script>
