        // ═══════════════════════════════════════════════════════════════════════════
        // LOBBY SYSTEM
        // ═══════════════════════════════════════════════════════════════════════════
        
        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return code;
        }

        function getUsername() {
            const name = usernameInput.value.trim();
            return name || "Anonim";
        }

        // Toggle Lobby List
        btnToggleLobby.addEventListener('click', () => {
            SoundFX.playClick();
            const isVisible = lobbySection.style.display !== 'none';
            lobbySection.style.display = isVisible ? 'none' : 'block';
            btnToggleLobby.textContent = isVisible ? 'Lobi Listesi' : 'Gizle';
            
            if (!isVisible) {
                startLobbyListener();
            } else {
                stopLobbyListener();
            }
        });

        // Refresh Button
        document.getElementById('btn-refresh').addEventListener('click', () => {
            SoundFX.playClick();
            refreshLobby();
        });

        function startLobbyListener() {
            const roomsRef = ref(db, 'blast_rooms');
            
            lobbyListener = onValue(roomsRef, (snapshot) => {
                const data = snapshot.val();
                renderLobbyList(data);
            });
        }

        function stopLobbyListener() {
            if (lobbyListener) {
                const roomsRef = ref(db, 'blast_rooms');
                off(roomsRef);
                lobbyListener = null;
            }
        }

        function refreshLobby() {
            roomList.innerHTML = '<div class="loading-spinner"></div>';
            
            get(ref(db, 'blast_rooms')).then((snapshot) => {
                const data = snapshot.val();
                renderLobbyList(data);
            });
        }

        function renderLobbyList(data) {
            roomList.innerHTML = '';
            
            if (!data) {
                roomList.innerHTML = `
                    <div class="empty-lobby">
                        <div class="empty-lobby-text">Su an aktif oda bulunamadi</div>
                        <div class="empty-lobby-glow">Ilk odayi sen kur!</div>
                    </div>
                `;
                roomCountEl.textContent = '0';
                return;
            }

            const waitingRooms = [];
            
            for (const [roomId, roomData] of Object.entries(data)) {
                if (roomData.status === 'waiting' && !roomData.p2) {
                    waitingRooms.push({
                        id: roomId,
                        host: roomData.p1?.name || 'Anonim',
                        ...roomData
                    });
                }
            }

            roomCountEl.textContent = waitingRooms.length.toString();

            if (waitingRooms.length === 0) {
                roomList.innerHTML = `
                    <div class="empty-lobby">
                        <div class="empty-lobby-text">Su an aktif oda bulunamadi</div>
                        <div class="empty-lobby-glow">Ilk odayi sen kur!</div>
                    </div>
                `;
                return;
            }

            waitingRooms.forEach(room => {
                const roomItem = document.createElement('div');
                roomItem.className = 'room-item';
                roomItem.innerHTML = `
                    <div class="room-info-col">
                        <div class="room-host">${room.host}'in Odasi</div>
                        <div class="room-id-small">ODA: ${room.id}</div>
                    </div>
                    <button class="join-btn" data-room-id="${room.id}">KATIL</button>
                `;
                
                const joinBtn = roomItem.querySelector('.join-btn');
                joinBtn.addEventListener('click', () => joinRoom(room.id));
                
                roomList.appendChild(roomItem);
            });
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // CREATE ROOM
        // ═══════════════════════════════════════════════════════════════════════════
        btnCreateRoom.addEventListener('click', async () => {
            SoundFX.init();
            SoundFX.playClick();
            if (SoundFX.bgmEnabled) SoundFX.startBGM();
            
            myUsername = getUsername();
            roomCode = generateRoomCode();
            playerSide = "p1";

            const roomRef = ref(db, 'blast_rooms/' + roomCode);
            
            await set(roomRef, {
                p1: { 
                    name: myUsername,
                    score: 0, 
                    board: JSON.stringify(localGrid), 
                    isGameOver: false 
                },
                status: "waiting",
                createdAt: Date.now()
            });

            stopLobbyListener();
            launchGameStream();
        });

        // ═══════════════════════════════════════════════════════════════════════════
        // JOIN ROOM
        // ═══════════════════════════════════════════════════════════════════════════
        async function joinRoom(targetRoomCode) {
            SoundFX.init();
            SoundFX.playClick();
            if (SoundFX.bgmEnabled) SoundFX.startBGM();
            
            myUsername = getUsername();
            roomCode = targetRoomCode;
            
            const roomRef = ref(db, 'blast_rooms/' + roomCode);
            const snapshot = await get(roomRef);
            const data = snapshot.val();
            
            if (!data) {
                alert("Bu oda artik mevcut degil!");
                refreshLobby();
                return;
            }
            
            if (data.p2 || data.status !== 'waiting') {
                alert("Bu oda dolu veya oyun baslamis!");
                refreshLobby();
                return;
            }

            playerSide = "p2";
            opponentUsername = data.p1?.name || "Anonim";
            
            await update(ref(db, `blast_rooms/${roomCode}/p2`), {
                name: myUsername,
                score: 0,
                board: JSON.stringify(localGrid),
                isGameOver: false
            });
            
            await update(roomRef, { status: "playing" });

            stopLobbyListener();
            launchGameStream();
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // BACK TO LOBBY / LEAVE ROOM
        // ═══════════════════════════════════════════════════════════════════════════
        document.getElementById('btn-back').addEventListener('click', () => {
            if (confirm('Oyundan cikmak istediginize emin misiniz? Oda silinecek.')) {
                leaveRoom();
            }
        });

        document.getElementById('btn-back-to-lobby').addEventListener('click', () => {
            leaveRoom();
        });

        async function leaveRoom() {
            if (roomListener) {
                const roomRef = ref(db, `blast_rooms/${roomCode}`);
                off(roomRef);
                roomListener = null;
            }

            try {
                await remove(ref(db, 'blast_rooms/' + roomCode));
            } catch (e) {
                console.log('Room cleanup error:', e);
            }

            resetGameState();
            
            lobbyScreen.style.display = 'flex';
            gameScreen.style.display = 'none';
            document.getElementById('game-over-overlay').style.display = 'none';
        }

        function resetGameState() {
            roomCode = "";
            playerSide = "";
            localGrid = Array(8).fill(null).map(() => Array(8).fill(0));
            localScore = 0;
            currentPieces = [];
            isGameOver = false;
            opponentUsername = "Rakip";
            
            document.getElementById('score-local').textContent = '0';
            document.getElementById('score-remote').textContent = '0';
            matchStatus.textContent = 'BAGLANTI BEKLENIYOR';
            matchStatus.classList.remove('playing', 'ended');
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // GAME STREAM LAUNCHER
        // ═══════════════════════════════════════════════════════════════════════════
        function launchGameStream() {
            lobbyScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            
            document.getElementById('display-your-name').textContent = myUsername;
            document.getElementById('display-opponent-name').textContent = opponentUsername || 'Bekleniyor...';

            const roomRef = ref(db, `blast_rooms/${roomCode}`);
            
            roomListener = onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    alert("Oda kapandi!");
                    resetGameState();
                    lobbyScreen.style.display = 'flex';
                    gameScreen.style.display = 'none';
                    return;
                }

                if (data.status === "playing") {
                    matchStatus.textContent = "SAVAS BASLADI";
                    matchStatus.classList.add('playing');
                    matchStatus.classList.remove('ended');
                }

                if (playerSide === "p1") {
                    animateScoreDisplay('score-local', data.p1.score);
                    if (data.p2) {
                        opponentUsername = data.p2.name || "Anonim";
                        document.getElementById('display-opponent-name').textContent = opponentUsername;
                        document.getElementById('opponent-panel-name').textContent = opponentUsername.toUpperCase();
                        animateScoreDisplay('score-remote', data.p2.score);
                        syncBoardDisplay('board-remote', JSON.parse(data.p2.board));
                    }
                } else {
                    if (data.p2) animateScoreDisplay('score-local', data.p2.score);
                    if (data.p1) {
                        opponentUsername = data.p1.name || "Anonim";
                        document.getElementById('display-opponent-name').textContent = opponentUsername;
                        document.getElementById('opponent-panel-name').textContent = opponentUsername.toUpperCase();
                        animateScoreDisplay('score-remote', data.p1.score);
                        syncBoardDisplay('board-remote', JSON.parse(data.p1.board));
                    }
                }

                if (data.p1 && data.p2) {
                    if (data.p1.isGameOver && data.p2.isGameOver) {
                        let resultMsg = "";
                        let titleColor = "var(--text-main)";
                        
                        if (data.p1.score > data.p2.score) {
                            resultMsg = playerSide === "p1" ? "KAZANDINIZ!" : "KAYBETTINIZ!";
                            titleColor = playerSide === "p1" ? "var(--success)" : "var(--danger)";
                        } else if (data.p2.score > data.p1.score) {
                            resultMsg = playerSide === "p2" ? "KAZANDINIZ!" : "KAYBETTINIZ!";
                            titleColor = playerSide === "p2" ? "var(--success)" : "var(--danger)";
                        } else {
                            resultMsg = "BERABERE BITTI!";
                            titleColor = "var(--accent)";
                        }

                        const overlay = document.getElementById('game-over-overlay');
                        overlay.style.display = 'flex';
                        
                        const title = document.getElementById('game-over-title');
                        title.textContent = "MAC BITTI";
                        title.style.color = titleColor;
                        
                        document.getElementById('game-over-msg').textContent = resultMsg;
                        document.getElementById('final-local-score').textContent = 
                            playerSide === "p1" ? data.p1.score : data.p2.score;
                        document.getElementById('final-remote-score').textContent = 
                            playerSide === "p1" ? data.p2.score : data.p1.score;
                    }
                }
            });

            createLocalBoard();
            spawnInventoryPieces();
            ParticleSystem.init();
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // SCORE ANIMATION
        // ═══════════════════════════════════════════════════════════════════════════
        function animateScoreDisplay(elementId, targetScore) {
            const el = document.getElementById(elementId);
            const currentScore = parseInt(el.textContent) || 0;
            if (currentScore === targetScore) return;

            el.classList.remove('score-pop');
            void el.offsetWidth;
            el.classList.add('score-pop');

            const duration = 350;
            const startTime = performance.now();
            const startVal = currentScore;

            function animate(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                el.textContent = Math.floor(startVal + (targetScore - startVal) * eased);
                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    el.textContent = targetScore;
                }
            }
            
            requestAnimationFrame(animate);
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // JUICE EFFECTS
        // ═══════════════════════════════════════════════════════════════════════════
        function triggerJuiceEffects(pointsText, linesCleared = 1) {
            boardLocal.classList.remove('shake-active');
            void boardLocal.offsetWidth;
            boardLocal.classList.add('shake-active');
            
            const rect = boardLocal.getBoundingClientRect();
            const floater = document.createElement('div');
            floater.className = 'floating-score';
            floater.textContent = pointsText;
            floater.style.left = `${rect.left + rect.width / 2}px`;
            floater.style.top = `${rect.top + rect.height / 2}px`;
            document.body.appendChild(floater);
            
            setTimeout(() => floater.remove(), 800);
            
            ComboSystem.showCombo(linesCleared);
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // BOARD CREATION & SYNC
        // ═══════════════════════════════════════════════════════════════════════════
        function createLocalBoard() {
            boardLocal.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    boardLocal.appendChild(cell);
                }
            }
        }

        function syncBoardDisplay(elementId, gridArray) {
            const targetBoard = document.getElementById(elementId);
            targetBoard.innerHTML = '';
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');
                    if (gridArray[r][c] !== 0) {
                        cell.classList.add('filled-block');
                        cell.style.backgroundColor = gridArray[r][c];
                    }
                    targetBoard.appendChild(cell);
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // INVENTORY SYSTEM
        // ═══════════════════════════════════════════════════════════════════════════
        function spawnInventoryPieces() {
            inventory.innerHTML = '';
            currentPieces = [];
            
            for (let i = 0; i < 3; i++) {
                const template = PIECE_TEMPLATES[Math.floor(Math.random() * PIECE_TEMPLATES.length)];
                const rows = template.matrix.length;
                const cols = template.matrix[0].length;
                
                const pieceObj = {
                    matrix: template.matrix,
                    color: template.color,
                    rows,
                    cols,
                    id: 'p_' + i + '_' + Date.now()
                };
                currentPieces.push(pieceObj);

                const holder = document.createElement('div');
                holder.classList.add('piece-holder');
                holder.dataset.pieceId = pieceObj.id;
                
                const matrixEl = document.createElement('div');
                matrixEl.classList.add('piece-matrix');
                matrixEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

                template.matrix.forEach(rowArray => {
                    rowArray.forEach(val => {
                        const pCell = document.createElement('div');
                        pCell.classList.add('p-cell');
                        if (val === 1) {
                            pCell.classList.add('active-block');
                            pCell.style.backgroundColor = template.color;
                        } else {
                            pCell.style.background = 'transparent';
                        }
                        matrixEl.appendChild(pCell);
                    });
                });
                
                holder.appendChild(matrixEl);
                inventory.appendChild(holder);
                setupDragAndDrop(holder, pieceObj);
            }
            
            verifyGameOverState();
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // DRAG & DROP SYSTEM (MOBILE OPTIMIZED)
        // ═══════════════════════════════════════════════════════════════════════════
        function setupDragAndDrop(holder, pieceObj) {
            let activeClone = null;
            let isDragging = false;
            
            const getYOffset = () => {
                const isMobile = window.matchMedia('(max-width: 768px)').matches;
                return isMobile ? -90 : -70;
            };

            holder.addEventListener('pointerdown', (e) => {
                if (isGameOver) return;
                e.preventDefault();
                
                SoundFX.playClick();
                isDragging = true;
                holder.style.opacity = '0.25';
                holder.style.transform = 'scale(0.9)';
                
                activeClone = holder.querySelector('.piece-matrix').cloneNode(true);
                activeClone.classList.add('dragging-active');
                document.body.appendChild(activeClone);
                
                moveClone(e.clientX, e.clientY);
                holder.setPointerCapture(e.pointerId);
            });

            holder.addEventListener('pointermove', (e) => {
                if (!activeClone || !isDragging) return;
                e.preventDefault();
                
                moveClone(e.clientX, e.clientY);
                highlightPlacementPreview(e.clientX, e.clientY + getYOffset(), pieceObj);
            });

            holder.addEventListener('pointerup', (e) => {
                if (!activeClone || !isDragging) return;
                
                holder.releasePointerCapture(e.pointerId);
                activeClone.remove();
                activeClone = null;
                isDragging = false;
                
                holder.style.opacity = '1';
                holder.style.transform = '';
                
                clearPreviews();

                const yOffset = getYOffset();
                if (executePlacement(e.clientX, e.clientY + yOffset, pieceObj)) {
                    holder.remove();
                    currentPieces = currentPieces.filter(p => p.id !== pieceObj.id);
                    
                    if (currentPieces.length === 0) {
                        spawnInventoryPieces();
                    } else {
                        verifyGameOverState();
                    }
                }
            });

            holder.addEventListener('pointercancel', () => {
                if (activeClone) {
                    activeClone.remove();
                    activeClone = null;
                }
                isDragging = false;
                holder.style.opacity = '1';
                holder.style.transform = '';
                clearPreviews();
            });

            function moveClone(x, y) {
                if (!activeClone) return;
                const yOffset = getYOffset();
                const cellSize = window.matchMedia('(min-height: 740px)').matches ? 20 : 16;
                activeClone.style.left = `${x - (pieceObj.cols * cellSize / 2)}px`;
                activeClone.style.top = `${y - (pieceObj.rows * cellSize / 2) + yOffset}px`;
            }
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // GRID TARGETING
        // ═══════════════════════════════════════════════════════════════════════════
        function getTargetCellFromCoords(x, y) {
            const rect = boardLocal.getBoundingClientRect();
            
            if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                return {
                    c: Math.floor((x - rect.left) / (rect.width / 8)),
                    r: Math.floor((y - rect.top) / (rect.height / 8))
                };
            }
            return null;
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // PREVIEW SYSTEM (FIXED PAINTING BUG)
        // ═══════════════════════════════════════════════════════════════════════════
        function clearPreviews() {
            const cells = boardLocal.querySelectorAll('.cell');
            let idx = 0;
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = cells[idx];
                    
                    cell.classList.remove('preview-ghost', 'preview-invalid');
                    
                    if (localGrid[r][c] === 0) {
                        cell.classList.remove('filled-block');
                        cell.style.backgroundColor = '';
                    } else {
                        cell.classList.add('filled-block');
                        cell.style.backgroundColor = localGrid[r][c];
                    }
                    
                    idx++;
                }
            }
        }

        function highlightPlacementPreview(x, y, pieceObj) {
            clearPreviews();
            
            const target = getTargetCellFromCoords(x, y);
            if (!target) return;
            
            if (target.r + pieceObj.rows > 8 || target.c + pieceObj.cols > 8) return;
            if (target.r < 0 || target.c < 0) return;

            let isValid = true;
            const cellsToHighlight = [];
            
            for (let r = 0; r < pieceObj.rows; r++) {
                for (let c = 0; c < pieceObj.cols; c++) {
                    if (pieceObj.matrix[r][c] === 1) {
                        const gridR = target.r + r;
                        const gridC = target.c + c;
                        
                        if (localGrid[gridR][gridC] !== 0) {
                            isValid = false;
                        }
                        
                        cellsToHighlight.push({ r: gridR, c: gridC });
                    }
                }
            }

            const cells = boardLocal.querySelectorAll('.cell');
            
            cellsToHighlight.forEach(({ r, c }) => {
                const idx = r * 8 + c;
                const cell = cells[idx];
                
                if (isValid) {
                    cell.classList.add('preview-ghost');
                    cell.style.backgroundColor = pieceObj.color;
                } else {
                    cell.classList.add('preview-invalid');
                }
            });
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // PLACEMENT EXECUTION
        // ═══════════════════════════════════════════════════════════════════════════
        function executePlacement(x, y, pieceObj) {
            const target = getTargetCellFromCoords(x, y);
            if (!target) return false;
            
            if (target.r + pieceObj.rows > 8 || target.c + pieceObj.cols > 8) return false;
            if (target.r < 0 || target.c < 0) return false;

            for (let r = 0; r < pieceObj.rows; r++) {
                for (let c = 0; c < pieceObj.cols; c++) {
                    if (pieceObj.matrix[r][c] === 1) {
                        if (localGrid[target.r + r][target.c + c] !== 0) {
                            return false;
                        }
                    }
                }
            }

            for (let r = 0; r < pieceObj.rows; r++) {
                for (let c = 0; c < pieceObj.cols; c++) {
                    if (pieceObj.matrix[r][c] === 1) {
                        localGrid[target.r + r][target.c + c] = pieceObj.color;
                    }
                }
            }

            let blocksPlaced = 0;
            for (let r = 0; r < pieceObj.rows; r++) {
                for (let c = 0; c < pieceObj.cols; c++) {
                    if (pieceObj.matrix[r][c] === 1) blocksPlaced++;
                }
            }
            localScore += blocksPlaced * 5;
            
            checkLinesAndExplode();
            
            renderLocalUI();
            SoundFX.playPlace();
            
            update(ref(db, `blast_rooms/${roomCode}/${playerSide}`), {
                score: localScore,
                board: JSON.stringify(localGrid)
            });
            
            return true;
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // LOCAL UI RENDER
        // ═══════════════════════════════════════════════════════════════════════════
        function renderLocalUI() {
            const cells = boardLocal.querySelectorAll('.cell');
            let i = 0;
            
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = cells[i];
                    
                    cell.className = 'cell';
                    cell.style.backgroundColor = '';
                    
                    if (localGrid[r][c] !== 0) {
                        cell.classList.add('filled-block');
                        cell.style.backgroundColor = localGrid[r][c];
                    }
                    
                    i++;
                }
            }
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // LINE DETECTION & EXPLOSION
        // ═══════════════════════════════════════════════════════════════════════════
        function checkLinesAndExplode() {
            const fullRows = [];
            const fullCols = [];
            const cellsToExplode = [];
            const cells = boardLocal.querySelectorAll('.cell');

            for (let r = 0; r < 8; r++) {
                if (localGrid[r].every(v => v !== 0)) {
                    fullRows.push(r);
                    for (let c = 0; c < 8; c++) {
                        cellsToExplode.push(cells[r * 8 + c]);
                    }
                }
            }

            for (let c = 0; c < 8; c++) {
                let full = true;
                for (let r = 0; r < 8; r++) {
                    if (localGrid[r][c] === 0) {
                        full = false;
                        break;
                    }
                }
                if (full) {
                    fullCols.push(c);
                    for (let r = 0; r < 8; r++) {
                        const cell = cells[r * 8 + c];
                        if (!cellsToExplode.includes(cell)) {
                            cellsToExplode.push(cell);
                        }
                    }
                }
            }

            fullRows.forEach(r => {
                for (let c = 0; c < 8; c++) {
                    localGrid[r][c] = 0;
                }
            });

            fullCols.forEach(c => {
                for (let r = 0; r < 8; r++) {
                    localGrid[r][c] = 0;
                }
            });

            const linesCleared = fullRows.length + fullCols.length;
            
            if (linesCleared > 0) {
                const baseBonus = linesCleared * 100;
                const comboMultiplier = Math.pow(1.5, linesCleared - 1);
                const bonus = Math.floor(baseBonus * comboMultiplier);
                localScore += bonus;
                
                SoundFX.playExplode(linesCleared);
                
                triggerJuiceEffects(`+${bonus}`, linesCleared);
                
                ParticleSystem.spawnLineExplosion(cellsToExplode, boardLocal.getBoundingClientRect());
                
                cellsToExplode.forEach((cell, index) => {
                    setTimeout(() => {
                        cell.classList.add('exploding');
                    }, index * 15);
                });
            }
        }

        // ═══════════════════════════════════════════════════════════════════════════
        // GAME OVER DETECTION
        // ═══════════════════════════════════════════════════════════════════════════
        function verifyGameOverState() {
            if (currentPieces.length === 0 || isGameOver) return;
            
            let canMove = false;
            
            for (const piece of currentPieces) {
                if (testPieceFit(piece.matrix, piece.rows, piece.cols)) {
                    canMove = true;
                    break;
                }
            }
            
            if (!canMove) {
                isGameOver = true;
                
                update(ref(db, `blast_rooms/${roomCode}/${playerSide}`), {
                    isGameOver: true
                });
                
                document.getElementById('final-local-score').textContent = localScore;
                document.getElementById('final-remote-score').textContent = 
                    document.getElementById('score-remote').textContent;
                
                document.getElementById('game-over-overlay').style.display = 'flex';
                matchStatus.textContent = "OYUN BITTI";
                matchStatus.classList.remove('playing');
                matchStatus.classList.add('ended');
                
                const holders = inventory.querySelectorAll('.piece-holder');
                holders.forEach(h => h.classList.add('disabled'));
            }
        }

        function testPieceFit(matrix, rows, cols) {
            for (let r = 0; r <= 8 - rows; r++) {
                for (let c = 0; c <= 8 - cols; c++) {
                    let fits = true;
                    
                    for (let pr = 0; pr < rows; pr++) {
                        for (let pc = 0; pc < cols; pc++) {
                            if (matrix[pr][pc] === 1 && localGrid[r + pr][c + pc] !== 0) {
                                fits = false;
                                break;
                            }
                        }
                        if (!fits) break;
                    }
                    
                    if (fits) return true;
                }
            }
            return false;
        }
    </script>
