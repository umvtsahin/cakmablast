<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Block Blast Duo - Arcade Premium</title>
    <style>
        :root {
            --bg-main: #060913;
            --bg-panel: rgba(19, 28, 46, 0.8);
            --bg-cell: #131926;
            --primary: #facc15; /* Canlı Retro Sarı */
            --primary-glow: rgba(250, 204, 21, 0.4);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --cyber-blue: #3b82f6;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-main);
            background-image: 
                linear-gradient(rgba(15, 23, 42, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 23, 42, 0.3) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace, -apple-system, sans-serif;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* PREMIUM MENÜ VE LOBİ EKRANI */
        #menu-screen {
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 40px 30px;
            border-radius: 20px;
            border: 2px solid rgba(59, 130, 246, 0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.7), 0 0 30px rgba(59, 130, 246, 0.1);
            text-align: center;
            width: 92%;
            max-width: 400px;
            z-index: 100;
            transform: translateY(0);
            transition: all 0.3s;
        }

        .logo-area {
            margin-bottom: 35px;
            position: relative;
        }

        .logo-area h1 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1px;
            color: #fff;
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.6), 0 0 20px rgba(59, 130, 246, 0.4);
            text-transform: uppercase;
            font-style: italic;
        }

        .logo-area h1 span {
            color: var(--primary);
            text-shadow: 0 0 10px rgba(250, 204, 21, 0.6);
        }

        .logo-area p {
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 16px;
            background: rgba(5, 8, 19, 0.8);
            border: 2px solid #22314d;
            color: var(--primary);
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        input:focus {
            outline: none;
            border-color: var(--cyber-blue);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4), inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .btn-premium {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 6px 0 #1e40af, 0 12px 20px rgba(0,0,0,0.4);
            transition: all 0.1s ease;
            text-transform: uppercase;
        }

        .btn-premium:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #1e40af, 0 4px 10px rgba(0,0,0,0.4);
        }

        /* OYUN ALANI */
        #game-screen {
            display: none;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            overflow: hidden;
        }

        .header-bar {
            width: 100%;
            max-width: 480px;
            background: rgba(19, 28, 46, 0.9);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px 18px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .status-badge {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            padding: 5px 12px;
            border-radius: 6px;
            font-weight: 900;
            color: #60a5fa;
            animation: pulse 1.5s infinite alternate;
        }

        /* DİNAMİK TAHTA ALANLARI */
        .boards-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 480px;
            gap: 12px;
            flex-grow: 1;
            justify-content: center;
            align-items: center;
            min-height: 0;
        }

        .arena-panel {
            background: rgba(15, 23, 42, 0.85);
            border: 2px solid #1e293b;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 280px;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @media (min-height: 720px) {
            .arena-panel { max-width: 330px; padding: 14px; }
        }

        /* RAKİP ARENASI - MOBİL MİNİMATÜRLERİ */
        .arena-panel.opponent-panel {
            max-width: 150px;
            opacity: 0.6;
            pointer-events: none;
            border-color: rgba(16, 185, 129, 0.2);
        }
        @media (min-height: 720px) {
            .arena-panel.opponent-panel { max-width: 180px; }
        }

        .panel-title {
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            color: var(--text-muted);
        }

        .panel-title span.score {
            color: #fff;
            font-size: 14px;
        }

        /* ANİMASYONLU SKOR SAYACI CLASS'I */
        .score-val {
            display: inline-block;
            font-weight: 900;
        }
        .score-val.score-pop {
            animation: scoreBadgePop 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.4);
        }

        @keyframes scoreBadgePop {
            0% { transform: scale(1); color: #fff; }
            50% { transform: scale(1.4); color: var(--primary); text-shadow: 0 0 8px var(--primary-glow); }
            100% { transform: scale(1); color: #fff; }
        }

        /* GRID VE Gelişmiş PIXEL MOTORU */
        .grid-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            gap: 3px;
            background: #090d16;
            padding: 6px;
            border-radius: 8px;
            aspect-ratio: 1 / 1;
            width: 100%;
            position: relative;
        }

        /* EKRAN SALLANMA EFEKTİ (JUICE) */
        .grid-board.shake-active {
            animation: boardExplosionShake 0.35s ease-in-out;
        }

        @keyframes boardExplosionShake {
            0%, 100% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 3px); }
            40% { transform: translate(4px, -3px); }
            60% { transform: translate(-3px, -2px); }
            80% { transform: translate(3px, 3px); }
        }

        .cell {
            background: var(--bg-cell);
            border-radius: 2px;
            box-shadow: inset 1px 1px 0 rgba(255,255,255,0.03);
            position: relative;
        }

        /* RETRO 3D PIXEL BLOK MODELLERİ */
        .cell.filled-p1, .p-cell.active-p1 {
            background: #ef4444 !important;
            box-shadow: inset 3px 3px 0 #f87171, 
                        inset -3px -3px 0 #991b1b, 
                        0 4px 6px rgba(0,0,0,0.4);
            border-radius: 2px;
        }

        .cell.filled-p2, .p-cell.active-p2 {
            background: #10b981 !important;
            box-shadow: inset 3px 3px 0 #34d399, 
                        inset -3px -3px 0 #065f46, 
                        0 4px 6px rgba(0,0,0,0.4);
            border-radius: 2px;
        }

        /* YARI SAYDAM HAYALET ÖNİZLEME (GHOST PREVIEW) */
        .cell.preview-p1 {
            background: rgba(239, 68, 68, 0.45) !important;
            box-shadow: inset 3px 3px 0 rgba(248, 113, 113, 0.3), 
                        inset -3px -3px 0 rgba(153, 27, 27, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: ghostPulse 0.6s infinite alternate ease-in-out;
        }

        .cell.preview-p2 {
            background: rgba(16, 185, 129, 0.45) !important;
            box-shadow: inset 3px 3px 0 rgba(52, 211, 153, 0.3), 
                        inset -3px -3px 0 rgba(6, 95, 70, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: ghostPulse 0.6s infinite alternate ease-in-out;
        }

        @keyframes ghostPulse {
            from { opacity: 0.4; }
            to { opacity: 0.75; }
        }

        /* BLOK SEÇİM ENVENTER ALANI */
        .inventory-area {
            width: 100%;
            max-width: 480px;
            background: rgba(19, 28, 46, 0.85);
            border-top: 2px solid #1e293b;
            border-radius: 16px;
            padding: 12px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            min-height: 100px;
            max-height: 120px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
            margin-top: auto;
        }

        .piece-holder {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 30%;
            aspect-ratio: 1 / 1;
            cursor: grab;
            position: relative;
            transition: transform 0.2s;
        }

        .piece-holder:active { cursor: grabbing; transform: scale(0.95); }

        .piece-matrix {
            display: grid;
            gap: 2px;
            transform: scale(0.75);
        }

        .p-cell {
            width: 16px;
            height: 16px;
            border-radius: 2px;
        }

        @media (min-height: 720px) {
            .p-cell { width: 20px; height: 20px; }
            .inventory-area { min-height: 125px; }
        }

        /* SÜRÜKLENEN KOPYA (DRAG CLONE) */
        .dragging-active {
            position: fixed;
            pointer-events: none;
            transform: scale(1.1);
            z-index: 1000;
            opacity: 0.9;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
        }

        /* UÇAN PUAN ANİMASYONU (FLOATING TEXT) */
        .floating-score {
            position: fixed;
            pointer-events: none;
            color: var(--primary);
            font-weight: 900;
            font-size: 24px;
            font-style: italic;
            text-shadow: 0 0 8px rgba(0,0,0,0.9), 0 0 4px var(--primary);
            z-index: 3000;
            animation: floatUpAndFade 0.8s ease-out forwards;
        }

        @keyframes floatUpAndFade {
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, -30px) scale(1.3); opacity: 1; }
            100% { transform: translate(-50%, -90px) scale(1); opacity: 0; }
        }

        /* OVERLAYS */
        #game-over-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(6, 9, 19, 0.96);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .overlay-card {
            background: rgba(19, 28, 46, 0.9);
            border: 2px solid rgba(239, 68, 68, 0.3);
            padding: 35px 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 340px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        @keyframes pulse {
            from { opacity: 0.5; }
            to { opacity: 1; }
        }

        /* BÜYÜK EKRAN / MASAÜSTÜ OPTİMİZASYONU */
        @media (min-width: 768px) {
            .boards-wrapper { flex-direction: row; max-width: 960px; gap: 40px; }
            .arena-panel { max-width: 370px; padding: 16px; }
            .arena-panel.opponent-panel { max-width: 370px; opacity: 1; pointer-events: auto; }
            #game-screen { padding: 40px; }
            .header-bar, .inventory-area { max-width: 960px; }
            .p-cell { width: 24px; height: 24px; }
            .panel-title { font-size: 13px; }
            .panel-title span.score { font-size: 16px; }
        }
    </style>
</head>
<body>

    <div id="menu-screen">
        <div class="logo-area">
            <h1>BLOCK <span>BLAST</span></h1>
            <p>Arcade Duel Edition</p>
        </div>
        <div class="input-group">
            <input type="text" id="room-id-input" placeholder="ODA KODU GİRİN" maxlength="12">
        </div>
        <button class="btn-premium" id="btn-connect">SAVAŞI BAŞLAT</button>
    </div>

    <div id="game-screen">
        <div class="header-bar">
            <div style="font-weight: 900; color: #fff;">ROOM: <span id="display-room-id" style="color:var(--cyber-blue)">-</span></div>
            <div class="status-badge" id="match-status">RAKİP ARANIYOR</div>
        </div>

        <div class="boards-wrapper">
            <div class="arena-panel opponent-panel" id="remote-panel">
                <div class="panel-title">
                    <span>RAKİP (Yeşil)</span>
                    <span class="score"><span class="score-val" id="score-remote">0</span></span>
                </div>
                <div class="grid-board" id="board-remote"></div>
            </div>

            <div class="arena-panel" id="local-panel">
                <div class="panel-title">
                    <span>SENİN ALANIN</span>
                    <span class="score">SKOR: <span class="score-val" id="score-local">0</span></span>
                </div>
                <div class="grid-board" id="board-local"></div>
            </div>
        </div>

        <div class="inventory-area" id="inventory"></div>
    </div>

    <div id="game-over-overlay">
        <div class="overlay-card">
            <h2 id="game-over-title" style="color:#ef4444; font-size:24px; margin-bottom:12px; font-weight:900;">HAMLE KALMADI</h2>
            <p id="game-over-msg" style="color:var(--text-muted); font-size:14px; margin-bottom:25px; text-transform:uppercase;">Rakibin hamleleri bekleniyor...</p>
            
            <div style="background:#090d16; padding:16px; border-radius:10px; margin-bottom:25px; text-align:left; border:1px solid #1e293b;">
                <div style="display:flex; justify-content:between; margin-bottom:8px;">
                    <span>SKORUNUZ:</span> <b id="final-local-score" style="margin-left:auto; color:var(--primary);">0</b>
                </div>
                <div style="display:flex; justify-content:between;">
                    <span>RAKİP SKORU:</span> <b id="final-remote-score" style="margin-left:auto; color:#fff;">0</b>
                </div>
            </div>

            <button class="btn-premium" onclick="window.location.reload()">YENİDEN KATIL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // !!! BURAYI KENDİ FIREBASE PROJE BİLGİLERİNLE DOLDUR !!!
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "projeniz.firebaseapp.com",
            databaseURL: "https://projeniz-default-rtdb.firebaseio.com",
            projectId: "projeniz",
            storageBucket: "projeniz.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:1234:web:abcd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- GELİŞMİŞ SENTEZLEYİCİ SES MOTORU ---
        const SoundFX = {
            ctx: null,
            init() { if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
            playClick() {
                this.init(); if (this.ctx.state === 'suspended') this.ctx.resume();
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'triangle'; osc.frequency.setValueAtTime(400, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(200, this.ctx.currentTime + 0.06);
                gain.gain.setValueAtTime(0.08, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.06);
                osc.start(); osc.stop(this.ctx.currentTime + 0.06);
            },
            playPlace() {
                this.init(); if (this.ctx.state === 'suspended') this.ctx.resume();
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'sine'; osc.frequency.setValueAtTime(220, this.ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(110, this.ctx.currentTime + 0.12);
                gain.gain.setValueAtTime(0.2, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
                osc.start(); osc.stop(this.ctx.currentTime + 0.12);
            },
            playExplode() {
                this.init(); if (this.ctx.state === 'suspended') this.ctx.resume();
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain(); osc.connect(gain); gain.connect(this.ctx.destination);
                osc.type = 'square'; osc.frequency.setValueAtTime(150, this.ctx.currentTime); osc.frequency.linearRampToValueAtTime(500, this.ctx.currentTime + 0.35);
                gain.gain.setValueAtTime(0.18, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.35);
                osc.start(); osc.stop(this.ctx.currentTime + 0.35);
            }
        };

        // --- OYUN DEĞİŞKENLERİ ---
        let roomCode = "";
        let playerSide = ""; 
        let localGrid = Array(8).fill().map(() => Array(8).fill(0));
        let localScore = 0;
        let currentPieces = []; 

        const PIECE_TEMPLATES = [
            { matrix: [[1, 1], [1, 1]] },
            { matrix: [[1, 1, 1, 1]] },
            { matrix: [[1], [1], [1], [1]] },
            { matrix: [[1, 0, 0], [1, 1, 1]] },
            { matrix: [[0, 1], [0, 1], [1, 1]] },
            { matrix: [[1, 1, 1], [0, 1, 0]] },
            { matrix: [[1]] }
        ];

        const menuScreen = document.getElementById('menu-screen');
        const gameScreen = document.getElementById('game-screen');
        const roomInput = document.getElementById('room-id-input');
        const btnConnect = document.getElementById('btn-connect');
        const displayRoomId = document.getElementById('display-room-id');
        const matchStatus = document.getElementById('match-status');
        const inventory = document.getElementById('inventory');
        const boardLocal = document.getElementById('board-local');

        btnConnect.addEventListener('click', () => {
            SoundFX.init();
            roomCode = roomInput.value.trim().toLowerCase();
            if (!roomCode) { alert("Lütfen geçerli bir oda kodu yazın!"); return; }

            const roomRef = ref(db, 'blast_rooms/' + roomCode);

            onValue(roomRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    playerSide = "p1";
                    set(roomRef, {
                        p1: { score: 0, board: JSON.stringify(localGrid), isGameOver: false },
                        status: "waiting"
                    });
                } else if (!data.p2) {
                    if (playerSide === "") {
                        playerSide = "p2";
                        update(ref(db, `blast_rooms/${roomCode}/p2`), { score: 0, board: JSON.stringify(localGrid), isGameOver: false });
                        update(roomRef, { status: "playing" });
                    }
                } else if (playerSide === "") {
                    alert("Seçilen oda tamamen dolu!"); window.location.reload();
                }
                launchGameStream();
            }, { onlyOnce: true });
        });

        function launchGameStream() {
            menuScreen.style.display = 'none';
            gameScreen.style.display = 'flex';
            displayRoomId.innerText = roomCode.toUpperCase();

            onValue(ref(db, `blast_rooms/${roomCode}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                if (data.status === "playing") {
                    matchStatus.innerText = "SAVAŞ BAŞLADI";
                    matchStatus.style.color = "#10b981";
                }

                if (playerSide === "p1") {
                    animateScoreDisplay('score-local', data.p1.score);
                    if (data.p2) {
                        animateScoreDisplay('score-remote', data.p2.score);
                        syncBoardDisplay('board-remote', JSON.parse(data.p2.board), 'filled-p2');
                    }
                } else {
                    if (data.p2) animateScoreDisplay('score-local', data.p2.score);
                    if (data.p1) {
                        animateScoreDisplay('score-remote', data.p1.score);
                        syncBoardDisplay('board-remote', JSON.parse(data.p1.board), 'filled-p1');
                    }
                }

                if (data.p1 && data.p2) {
                    if (data.p1.isGameOver && data.p2.isGameOver) {
                        let winnerMsg = "";
                        if (data.p1.score > data.p2.score) winnerMsg = "🏆 REKABETİ 1. OYUNCU (P1) KAZANDI!";
                        else if (data.p2.score > data.p1.score) winnerMsg = "🏆 REKABETİ 2. OYUNCU (P2) KAZANDI!";
                        else winnerMsg = "🤝 DOSTLUK KAZANDI! BERABERE.";

                        document.getElementById('game-over-overlay').style.display = 'flex';
                        document.getElementById('game-over-title').innerText = "MAÇ BİTTİ";
                        document.getElementById('game-over-title').style.color = "var(--primary)";
                        document.getElementById('game-over-msg').innerText = winnerMsg;
                        
                        document.getElementById('final-local-score').innerText = playerSide === "p1" ? data.p1.score : data.p2.score;
                        document.getElementById('final-remote-score').innerText = playerSide === "p1" ? data.p2.score : data.p1.score;
                    }
                }
            });

            createLocalBoard();
            spawnInventoryPieces();
        }

        // PUAN SAYACI YUKARI DOĞRU SAYMA VE POP ANİMASYONU MOTORU
        function animateScoreDisplay(elementId, targetScore) {
            const el = document.getElementById(elementId);
            const currentScore = parseInt(el.innerText) || 0;
            if (currentScore === targetScore) return;

            el.classList.remove('score-pop');
            void el.offsetWidth; // Reflow tetikle
            el.classList.add('score-pop');

            let start = currentScore;
            const duration = 350;
            const startTime = performance.now();

            function run(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const currentVal = Math.floor(start + (targetScore - start) * progress);
                el.innerText = currentVal;
                if (progress < 1) {
                    requestAnimationFrame(run);
                } else {
                    el.innerText = targetScore;
                }
            }
            requestAnimationFrame(run);
        }

        // SALLANMA VE UÇAN PUAN FABRİKASI
        function triggerScreenJuice(pointsText) {
            const board = boardLocal;
            board.classList.remove('shake-active');
            void board.offsetWidth;
            board.classList.add('shake-active');

            const rect = board.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            const floater = document.createElement('div');
            floater.className = 'floating-score';
            floater.innerText = pointsText;
            floater.style.left = `${centerX}px`;
            floater.style.top = `${centerY}px`;
            document.body.appendChild(floater);

            setTimeout(() => floater.remove(), 800);
        }

        function createLocalBoard() {
            boardLocal.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div'); cell.classList.add('cell');
                    cell.dataset.row = r; cell.dataset.col = c; boardLocal.appendChild(cell);
                }
            }
        }

        function syncBoardDisplay(elementId, gridArray, className) {
            const targetBoard = document.getElementById(elementId); targetBoard.innerHTML = '';
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const cell = document.createElement('div'); cell.classList.add('cell');
                    if (gridArray[r][c] === 1) cell.classList.add(className); targetBoard.appendChild(cell);
                }
            }
        }

        function spawnInventoryPieces() {
            inventory.innerHTML = '';
            currentPieces = [];

            for (let i = 0; i < 3; i++) {
                const idx = Math.floor(Math.random() * PIECE_TEMPLATES.length);
                const template = PIECE_TEMPLATES[idx];
                const rows = template.matrix.length;
                const cols = template.matrix[0].length;

                const pieceObj = { matrix: template.matrix, rows, cols, id: 'piece_' + i + '_' + Date.now() };
                currentPieces.push(pieceObj);

                const holder = document.createElement('div'); holder.classList.add('piece-holder');
                const matrixEl = document.createElement('div'); matrixEl.classList.add('piece-matrix');
                matrixEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

                template.matrix.forEach(rowArray => {
                    rowArray.forEach(val => {
                        const pCell = document.createElement('div'); pCell.classList.add('p-cell');
                        if (val === 1) pCell.classList.add(playerSide === 'p1' ? 'active-p1' : 'active-p2');
                        else pCell.style.background = 'transparent';
                        matrixEl.appendChild(pCell);
                    });
                });

                holder.appendChild(matrixEl); inventory.appendChild(holder);
                setupDragAndDrop(holder, pieceObj);
            }

            verifyGameOverState();
        }

        function setupDragAndDrop(holder, pieceObj) {
            let activeClone = null;
            const yOffset = -70; // Parmağın bloğu örtmemesi için ergonomik offset mesafesi

            holder.addEventListener('pointerdown', (e) => {
                e.preventDefault(); 
                SoundFX.playClick();
                holder.style.opacity = '0.2';

                activeClone = holder.querySelector('.piece-matrix').cloneNode(true);
                activeClone.classList.add('dragging-active');
                document.body.appendChild(activeClone);

                moveClone(e.clientX, e.clientY);
                holder.setPointerCapture(e.pointerId);
            });

            holder.addEventListener('pointermove', (e) => {
                if (!activeClone) return;
                moveClone(e.clientX, e.clientY);
                highlightPlacementPreview(e.clientX, e.clientY + yOffset, pieceObj);
            });

            holder.addEventListener('pointerup', (e) => {
                if (!activeClone) return;
                holder.releasePointerCapture(e.pointerId);
                activeClone.remove();
                activeClone = null;
                holder.style.opacity = '1';
                clearPreviews();

                const success = executePlacement(e.clientX, e.clientY + yOffset, pieceObj);
                if (success) {
                    holder.remove();
                    currentPieces = currentPieces.filter(p => p.id !== pieceObj.id);

                    if (currentPieces.length === 0) {
                        spawnInventoryPieces(); 
                    } else {
                        verifyGameOverState();
                    }
                }
            });

            function moveClone(x, y) {
                if (!activeClone) return;
                const cloneWidth = pieceObj.cols * 20; 
                const cloneHeight = pieceObj.rows * 20;
                activeClone.style.left = `${x - (cloneWidth / 2)}px`;
                activeClone.style.top = `${y - (cloneHeight / 2) + yOffset}px`;
            }
        }

        function getTargetCellFromCoords(x, y) {
            const rect = boardLocal.getBoundingClientRect();
            if (x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) {
                const cellWidth = rect.width / 8;
                const cellHeight = rect.height / 8;
                const c = Math.floor((x - rect.left) / cellWidth);
                const r = Math.floor((y - rect.top) / cellHeight);
                if (r >= 0 && r < 8 && c >= 0 && c < 8) return { r, c };
            }
            return null;
        }

        function clearPreviews() { 
            document.querySelectorAll('#board-local .cell').forEach(c => {
                c.classList.remove('preview-p1', 'preview-p2');
            }); 
        }

        // GELİŞMİŞ YARI SAYDAM HAYALET BLOK ÖNİZLEME LOGIC'I
        function highlightPlacementPreview(x, y, pieceObj) {
            clearPreviews();
            const target = getTargetCellFromCoords(x, y);
            if (!target) return;

            if (target.r + pieceObj.rows <= 8 && target.c + pieceObj.cols <= 8) {
                let valid = true;
                for (let r = 0; r < pieceObj.rows; r++) {
                    for (let c = 0; c < pieceObj.cols; c++) {
                        if (pieceObj.matrix[r][c] === 1 && localGrid[target.r + r][target.c + c] === 1) valid = false;
                    }
                }
                if (valid) {
                    const localCells = document.querySelectorAll('#board-local .cell');
                    const previewClass = playerSide === 'p1' ? 'preview-p1' : 'preview-p2';
                    for (let r = 0; r < pieceObj.rows; r++) {
                        for (let c = 0; c < pieceObj.cols; c++) {
                            if (pieceObj.matrix[r][c] === 1) {
                                const idx = (target.r + r) * 8 + (target.c + c);
                                if(localCells[idx]) localCells[idx].classList.add(previewClass);
                            }
                        }
                    }
                }
            }
        }

        function executePlacement(x, y, pieceObj) {
            const target = getTargetCellFromCoords(x, y);
            if (!target || target.r + pieceObj.rows > 8 || target.c + pieceObj.cols > 8) return false;

            for (let r = 0; r < pieceObj.rows; r++) {
                for (let c = 0; c < pieceObj.cols; c++) {
                    if (pieceObj.matrix[r][c] === 1 && localGrid[target.r + r][target.c + c] === 1) return false;
                }
            }

            for (let r = 0; r < pieceObj.rows; r++) {
                for (let c = 0; c < pieceObj.cols; c++) {
                    if (pieceObj.matrix[r][c] === 1) localGrid[target.r + r][target.c + c] = 1;
                }
            }

            localScore += 15;
            checkLinesAndExplode();
            renderLocalUI();

            update(ref(db, `blast_rooms/${roomCode}/${playerSide}`), {
                score: localScore,
                board: JSON.stringify(localGrid)
            });

            SoundFX.playPlace();
            return true;
        }

        function renderLocalUI() {
            const cells = document.querySelectorAll('#board-local .cell');
            const myClass = playerSide === 'p1' ? 'filled-p1' : 'filled-p2';
            let i = 0;
            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    cells[i].className = 'cell';
                    if (localGrid[r][c] === 1) cells[i].classList.add(myClass); i++;
                }
            }
        }

        function checkLinesAndExplode() {
            let fullRows = []; let fullCols = [];
            for (let r = 0; r < 8; r++) { if (localGrid[r].every(v => v === 1)) fullRows.push(r); }
            for (let c = 0; c < 8; c++) {
                let full = true; for (let r = 0; r < 8; r++) { if (localGrid[r][c] === 0) full = false; }
                if (full) fullCols.push(c);
            }
            fullRows.forEach(r => localGrid[r].fill(0));
            fullCols.forEach(c => { for (let r = 0; r < 8; r++) localGrid[r][c] = 0; });

            if (fullRows.length > 0 || fullCols.length > 0) {
                const totalClears = fullRows.length + fullCols.length;
                const bonusPoints = totalClears * 120;
                localScore += bonusPoints; 
                
                SoundFX.playExplode();
                triggerScreenJuice(`+${bonusPoints} COMBO!`);
            }
        }

        function verifyGameOverState() {
            if (currentPieces.length === 0) return;
            let canMoveExist = false;

            for (let piece of currentPieces) {
                if (testPieceFitAnywhere(piece.matrix, piece.rows, piece.cols)) {
                    canMoveExist = true; break; 
                }
            }

            if (!canMoveExist) {
                update(ref(db, `blast_rooms/${roomCode}/${playerSide}`), { isGameOver: true });
                
                document.getElementById('final-local-score').innerText = localScore;
                document.getElementById('final-remote-score').innerText = document.getElementById('score-remote').innerText;

                document.getElementById('game-over-overlay').style.display = 'flex';
                matchStatus.innerText = "ELENDİNİZ";
                matchStatus.style.color = "#ef4444";
            }
        }

        function testPieceFitAnywhere(matrix, rows, cols) {
            for (let r = 0; r <= 8 - rows; r++) {
                for (let c = 0; c <= 8 - cols; c++) {
                    let fits = true;
                    for (let pr = 0; pr < rows; pr++) {
                        for (let pc = 0; pc < cols; pc++) {
                            if (matrix[pr][pc] === 1 && localGrid[r + pr][c + pc] === 1) { fits = false; break; }
                        }
                        if (!fits) break;
                    }
                    if (fits) return true; 
                }
            }
            return false; 
        }
    </script>
